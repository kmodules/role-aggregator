apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubedb-crd-manager
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs: ["list"]
- apiGroups:
  - batch
  resources:
  - jobs
  verbs: ["get"]
- apiGroups:
  - apps
  resources:
  - deployments
  verbs: ["list", "update", "get"]
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs: ["create", "delete", "get", "list", "watch", "update", "patch"]
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs: ["*"]
- apiGroups:
  - kubedb.com
  resources: ["*"]
  verbs: ["list"]
